<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CL Digital — Admin LavaSync</title>
  <style>
    :root{
      --navy:#0D2B52; --blue:#1976D2; --blue-hover:#1565C0; --aqua:#29B6C5;
      --gold:#E8A020; --bg:#F0F8FF; --white:#fff; --border:#D6E8F8;
      --text-dark:#0D2B52; --text-mid:#4A6380; --text-light:#8AAAC8;
      --radius:12px; --shadow:0 2px 16px rgba(13,43,82,.08);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text-dark);min-height:100vh;padding:28px 16px;}
    .wrap{max-width:640px;margin:0 auto;}
    .top{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
    .top h1{font-size:22px;}
    .top .tag{background:var(--navy);color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;letter-spacing:.5px;}
    .sub{font-size:13px;color:var(--text-mid);margin-bottom:24px;}
    .card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:26px;margin-bottom:20px;}
    .card h2{font-size:15px;margin-bottom:18px;color:var(--navy);}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 16px;}
    .full{grid-column:1/-1;}
    label{display:block;font-size:11px;font-weight:700;color:var(--text-mid);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;}
    input{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;color:var(--text-dark);outline:none;}
    input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(25,118,210,.12);}
    .btn{width:100%;padding:13px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;background:var(--blue);color:#fff;transition:background .18s;}
    .btn:hover{background:var(--blue-hover);}
    .btn:disabled{opacity:.6;cursor:wait;}
    .msg{margin-top:14px;font-size:14px;padding:12px 14px;border-radius:8px;display:none;}
    .msg.ok{display:block;background:#e6f7ee;color:#137a45;border:1px solid #b6e6cd;}
    .msg.err{display:block;background:#fdeaea;color:#c0392b;border:1px solid #f3c2c2;}
    .token-row{display:flex;gap:10px;align-items:flex-end;}
    .token-row .grow{flex:1;}
    .lista-item{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border);font-size:14px;}
    .lista-item:last-child{border-bottom:none;}
    .lista-item .nome{font-weight:600;color:var(--navy);}
    .lista-item .tel{color:var(--text-mid);font-size:12.5px;}
    .empty{color:var(--text-light);font-size:13px;text-align:center;padding:16px;}
    .cor-input{height:42px;padding:4px;}
    .hint{font-size:12px;color:var(--text-light);margin-top:8px;}
  </style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <h1>Painel LavaSync</h1>
    <span class="tag">CL DIGITAL</span>
  </div>
  <p class="sub">Cadastro de novos lava-jatos — só para uso interno.</p>

  <!-- Token de admin -->
  <div class="card">
    <h2>🔑 Acesso</h2>
    <div class="token-row">
      <div class="grow">
        <label for="admin-token">Token de admin</label>
        <input type="password" id="admin-token" placeholder="Sua senha de admin">
      </div>
      <button class="btn" style="width:auto;padding:11px 18px;" id="btn-lembrar">Salvar</button>
    </div>
    <p class="hint">Fica guardado só neste navegador (sessão). É o valor de <b>ADMIN_TOKEN</b> do Netlify.</p>
  </div>

  <!-- Formulário de cadastro -->
  <div class="card">
    <h2>➕ Novo lava-jato</h2>
    <div class="grid">
      <div class="full">
        <label for="nome">Nome do lava-jato</label>
        <input type="text" id="nome" placeholder="Ex: Lava-Jato do Zé">
      </div>
      <div>
        <label for="telefone">Telefone</label>
        <input type="tel" id="telefone" placeholder="(11) 99999-9999">
      </div>
      <div>
        <label for="cor">Cor principal</label>
        <input type="color" id="cor" class="cor-input" value="#1976D2">
      </div>
      <div class="full">
        <label for="nome_dono">Nome do dono (responsável)</label>
        <input type="text" id="nome_dono" placeholder="Ex: José">
      </div>
      <div>
        <label for="email">E-mail de login</label>
        <input type="email" id="email" placeholder="dono@lavajato.com">
      </div>
      <div>
        <label for="senha">Senha inicial</label>
        <input type="text" id="senha" placeholder="mín. 6 caracteres">
      </div>
      <div class="full">
        <button class="btn" id="btn-criar">Cadastrar lava-jato</button>
      </div>
    </div>
    <div class="msg" id="msg"></div>
  </div>

  <!-- Lista de clientes -->
  <div class="card">
    <h2>🏢 Lava-jatos cadastrados</h2>
    <div id="lista"><p class="empty">Informe o token e clique em "Atualizar".</p></div>
    <button class="btn" style="margin-top:16px;background:var(--navy);" id="btn-listar">Atualizar lista</button>
  </div>

</div>

<script>
  const API = "/.netlify/functions/criar-lavajato";
  const $ = (id) => document.getElementById(id);

  // Lembra o token na sessão
  $("admin-token").value = sessionStorage.getItem("lavasync_admin_token") || "";
  $("btn-lembrar").addEventListener("click", () => {
    sessionStorage.setItem("lavasync_admin_token", $("admin-token").value);
    mostrar("ok", "Token salvo nesta sessão.");
  });

  function token() { return $("admin-token").value.trim(); }

  function mostrar(tipo, texto) {
    const m = $("msg");
    m.className = "msg " + (tipo === "ok" ? "ok" : "err");
    m.textContent = texto;
  }

  // Cadastrar
  $("btn-criar").addEventListener("click", async () => {
    if (!token()) return mostrar("err", "Informe o token de admin primeiro.");
    const payload = {
      nome:      $("nome").value.trim(),
      telefone:  $("telefone").value.trim(),
      cor:       $("cor").value,
      nome_dono: $("nome_dono").value.trim(),
      email:     $("email").value.trim(),
      senha:     $("senha").value,
    };
    if (!payload.nome || !payload.email || !payload.senha) {
      return mostrar("err", "Preencha nome do lava-jato, e-mail e senha.");
    }

    $("btn-criar").disabled = true;
    $("btn-criar").textContent = "Cadastrando...";
    try {
      const r = await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-admin-token": token() },
        body: JSON.stringify(payload),
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.erro || "Falha ao cadastrar.");
      mostrar("ok", `✔ "${payload.nome}" cadastrado! Login: ${payload.email} / senha: ${payload.senha}`);
      ["nome","telefone","nome_dono","email","senha"].forEach((id) => ($(id).value = ""));
      listar();
    } catch (e) {
      mostrar("err", e.message);
    } finally {
      $("btn-criar").disabled = false;
      $("btn-criar").textContent = "Cadastrar lava-jato";
    }
  });

  // Listar
  async function listar() {
    if (!token()) return;
    const box = $("lista");
    box.innerHTML = '<p class="empty">Carregando...</p>';
    try {
      const r = await fetch(API, { headers: { "x-admin-token": token() } });
      const data = await r.json();
      if (!r.ok) throw new Error(data.erro || "Falha ao listar.");
      const arr = data.lava_jatos || [];
      if (arr.length === 0) { box.innerHTML = '<p class="empty">Nenhum lava-jato cadastrado ainda.</p>'; return; }
      box.innerHTML = arr.map((lj) => `
        <div class="lista-item">
          <span class="nome">${lj.nome}</span>
          <span class="tel">${lj.telefone || "—"}</span>
        </div>`).join("");
    } catch (e) {
      box.innerHTML = `<p class="empty" style="color:#c0392b;">${e.message}</p>`;
    }
  }
  $("btn-listar").addEventListener("click", listar);
</script>
</body>
</html>
